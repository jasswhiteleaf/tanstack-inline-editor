<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Mark: two overlapping squares suggesting layered primitives / composition -->
  <!-- Back square (offset) -->
  <rect x="8" y="8" width="34" height="34" rx="5" stroke="currentColor" stroke-width="2"/>
  <!-- Front square (filled white knockout) -->
  <rect x="0" y="0" width="34" height="34" rx="5" fill="white" stroke="currentColor" stroke-width="2"/>
  <!-- Inner bars — two lines of different length, like a component with props -->
  <rect x="7" y="9"  width="20" height="6" rx="1.5" fill="currentColor"/>
  <rect x="7" y="20" width="13" height="6" rx="1.5" fill="currentColor"/>

  <!-- Wordmark -->
  <text
    x="48"
    y="14"
    font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace"
    font-size="15"
    font-weight="600"
    fill="currentColor"
    letter-spacing="-0.3"
  >baseui-cn</text>

  <!-- Tagline line 1 -->
  <text
    x="48"
    y="28"
    font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace"
    font-size="9"
    font-weight="400"
    fill="currentColor"
    opacity="0.55"
  >Base UI components.</text>

  <!-- Tagline line 2 -->
  <text
    x="48"
    y="40"
    font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace"
    font-size="9"
    font-weight="400"
    fill="currentColor"
    opacity="0.55"
  >One command install.</text>
</svg>
